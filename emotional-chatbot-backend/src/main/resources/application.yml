server:
  port: ${SERVER_PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:emotional_chatbot}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: America/Bogota

app:
  jwt:
    secret: ${JWT_SECRET:CAMBIAR_ESTE_SECRETO_EN_PRODUCCION}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
